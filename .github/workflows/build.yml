name: 🚀 Build & Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'XIAOHAI.AI/XIAOHAI.AI.csproj'
  OUTPUT_PATH: 'publish'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 📦 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 📋 Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: 🔨 Build
      run: dotnet build ${{ env.PROJECT_PATH }} -c Release --no-restore

    - name: 🧪 Run tests (if any)
      run: dotnet test ${{ env.PROJECT_PATH }} -c Release --no-build --verbosity normal
      continue-on-error: true

    - name: 📦 Publish (Portable)
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishReadyToRun=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o "${{ env.OUTPUT_PATH }}/portable"

    - name: 📦 Publish (Installer)
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -o "${{ env.OUTPUT_PATH }}/installer"

    - name: 📝 Generate Version Info
      id: version
      run: |
        $version = if ($env:GITHUB_REF -like 'refs/tags/v*') {
          $env:GITHUB_REF -replace 'refs/tags/v',''
        } else {
          $date = Get-Date -Format "yyyy.MM.dd"
          $sha = $env:GITHUB_SHA.Substring(0,7)
          "$date-dev-$sha"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "Build version: $version"

    - name: 📝 Generate Release Notes
      run: |
        $date = Get-Date -Format "yyyy-MM-dd"
        $version = "${{ steps.version.outputs.version }}"
        $notes = @"
        ## v$version - $date
        
        ### ✨ 新增功能
        - 自动构建版本
        
        ### 🔧 优化改进
        - CI/CD 自动化构建
        - 性能优化
        
        ### 📦 技术更新
        - .NET 10.0
        - GitHub Actions
        
        ---
        *Full changelog: https://github.com/lss19981213/xiaohai.ai.wpf/compare/v$version...HEAD*
        "@
        $notes | Out-File -FilePath "release-notes.md" -Encoding utf8
        cat release-notes.md

    - name: 📦 Create Portable ZIP
      run: |
        Compress-Archive -Path "${{ env.OUTPUT_PATH }}/portable/*" `
          -DestinationPath "XIAOHAI.AI-${{ steps.version.outputs.version }}-portable.zip" `
          -Force

    - name: 📦 Create Installer EXE
      run: |
        # Create simple installer using IExpress or Inno Setup
        # For now, just copy the installer build
        Copy-Item "${{ env.OUTPUT_PATH }}/installer/XIAOHAI.AI.exe" `
          "XIAOHAI.AI-${{ steps.version.outputs.version }}-installer.exe"

    - name: 📊 Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          XIAOHAI.AI-*-portable.zip
          XIAOHAI.AI-*-installer.exe
          release-notes.md
        retention-days: 30

    - name: 🚀 Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        body_path: release-notes.md
        files: |
          XIAOHAI.AI-*-portable.zip
          XIAOHAI.AI-*-installer.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 🚀 Create Dev Release (on push)
      if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: dev-${{ steps.version.outputs.version }}
        name: "🔧 Dev Build ${{ steps.version.outputs.version }}"
        body_path: release-notes.md
        files: |
          XIAOHAI.AI-*-portable.zip
          XIAOHAI.AI-*-installer.exe
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
